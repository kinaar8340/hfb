# Hopf Flux Bubble — default simulation parameters
# Analog effective metric from defect wall + vortex flow + shift profile
# + optional resonant electro-vibrational control (hemi-void slingshot)

grid:
  nx: 128
  ny: 128
  extent: 4.0

bubble:
  radius: 1.0
  wall_width: 0.25
  defect_amplitude: 1.0
  defect_profile: toroidal_bubble_wall
  use_3d_torus: true
  circulation: 0.35
  sound_speed: 1.0

# Orthogonal hemi / gourd void bubble (used by hfb-slingshot)
hemi_void:
  major_radius: 1.0
  wall_width: 0.22
  elongation: 1.4
  rear_extension: 0.45
  front_taper: 0.7
  axis: x

# Resonant electro-vibrational control layer
electro_vibrational:
  inner_radius: 0.85
  outer_radius: 1.15
  charge_density: 1.0
  vibration_amp: 0.15
  phase_threshold: 0.72
  medium_resonance: 1.0
  drive_frequency: 1.0
  release_detuning: 0.35
  nucleate_duration: 1.0
  store_duration: 2.0
  release_duration: 0.8
  enable_observer: true
  observer_coupling: 0.4
  observer_frequency: 1.0
  hum_frequency: 1.0
  t_max: 5.0
  dt: 0.05

warp_compare:
  vs: 0.3
  rs: 1.0
  sigma: 0.25

sweep:
  radii: [0.7, 0.9, 1.0, 1.2, 1.5]
  circulations: [0.15, 0.3, 0.45, 0.6]

optics:
  lg_winding: 1
  beam_waist: 1.0
  delta_n: 0.08
  n_eff: 1.55

hopf:
  major_radius: 1.0
  minor_radius: 0.35
  hopf_index: 1
  z_slice: 0.0
  use_3d_torus: true
  use_3d_torus: false
  slice_z: 0.0

bec:
  n0: 1.0
  trap_radius: 1.5
  interaction: 1.0
  num_vortices: 8
  vortex_ring_radius: 1.0
  winding: 1
  temperature: 0.0

slm:
  device_preset: generic_512
  ring_radius_mm: 1.2
  num_vortices: 12
  winding: 1
  amplitude: 1.0
  core_sigma_mm: 0.25
  extent_mm: 4.0
  phase_twist_per_frame: 0.0

warp_compare:
  vs: 0.3
  rs: 1.0
  sigma: 0.25

caveats: >
  Effective analog only — not literal GR curvature or superluminal transport.
  Stability metrics are heuristic proxies for tabletop exploration.